# ============================================================
# 教室场景检测类别定义（MindRoom Guard v2）
# 对应智谱升级计划中 "三模态分项 visual" 的视觉前端输入
# ============================================================

# ---------- 目标检测 (YOLO Det head) ----------
# 类别 0-7 用于人脸表情/姿态检测
names:
  0: face_frontal       # 正脸（视线朝向摄像头）
  1: face_side          # 侧脸（偏转 > 30°）
  2: face_down          # 低头（俯角 > 20°，眼睛不可见）
  3: face_occluded      # 遮挡脸（手/书/头发遮挡 > 50%）
  4: hand_face          # 手托脸（单手或双手）
  5: body_slouch        # 趴桌/塌肩
  6: body_upright       # 正常坐姿
  7: phone_use          # 使用手机/电子设备

# ---------- 难度标签 (辅助标注) ----------
# 8-9 用于记录拍摄条件，不参与训练
  8: lighting_backlight # 逆光
  9: lighting_dim       # 昏暗

nc: 8  # 参与训练的类别数 (0-7)

# ---------- 格式说明 ----------
# 每张图片配一个字幕 .txt（YOLO 格式）：
#   class_id cx cy w h
# 示例（test_img_001.jpg → test_img_001.txt）：
#   0 0.523 0.340 0.156 0.234
#   1 0.718 0.291 0.142 0.211
# 坐标已归一化到 [0,1]
#
# 建议先标注 50 张 → 用 YOLOv8 预训练模型做半自动标注 →
# 仅需人工审核修正剩余 150-450 张，大幅减少工作量。
